<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Диалог с ИИ</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e7edf4;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --user-bubble: #2563eb;
      --ai-bubble: #243044;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
    }
    header p {
      margin: 0.35rem 0 0;
      font-size: 0.8rem;
      color: var(--muted);
    }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.25rem 5.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .row {
      display: flex;
      gap: 0.5rem;
      max-width: 52rem;
      width: 100%;
    }
    .row.user { align-self: flex-end; flex-direction: row-reverse; }
    .row.ai { align-self: flex-start; }
    .bubble {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 1rem;
      line-height: 1.5;
      font-size: 0.95rem;
      white-space: normal;
      word-break: break-word;
    }
    .row.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 0.25rem;
    }
    .row.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 0.25rem;
    }
    .bubble .meta {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .bubble.ai-body strong { color: #93c5fd; font-weight: 600; }
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.75rem 1.25rem;
      background: linear-gradient(transparent, var(--bg) 12%);
      border-top: 1px solid var(--border);
      background-color: var(--surface);
    }
    .composer {
      display: flex;
      gap: 0.5rem;
      max-width: 52rem;
      margin: 0 auto;
      align-items: flex-end;
    }
    .composer textarea {
      flex: 1;
      min-height: 2.75rem;
      max-height: 8rem;
      resize: vertical;
      padding: 0.65rem 0.85rem;
      border-radius: 0.75rem;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font: inherit;
      line-height: 1.4;
    }
    .composer textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(61, 139, 253, 0.25);
    }
    .composer button {
      padding: 0.65rem 1.15rem;
      border: none;
      border-radius: 0.75rem;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .composer button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .err {
      color: #f87171;
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }
    .typing {
      display: inline-flex;
      gap: 4px;
      padding: 0.5rem 0;
    }
    .typing span {
      width: 6px;
      height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: b 1.2s infinite ease-in-out both;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes b {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Диалог с ИИ</h1>
    <p>Запрос к API: <code>?ask=…</code> · ответ: JSON-объект <code>{ "response": "…" }</code> или массив из такого объекта</p>
  </header>
  <div id="log" aria-live="polite"></div>
  <footer>
    <div class="composer">
      <textarea id="q" rows="2" placeholder="Ваш вопрос…" autocomplete="off"></textarea>
      <button type="button" id="send">Отправить</button>
    </div>
  </footer>

  <script>
    /**
     * Полный URL эндпоинта без «?» в конце.
     * Будет вызван: API_URL + '?ask=' + encodeURIComponent(текст)
     */
  const API_URL = 'https://repository-walter-devon-motorcycles.trycloudflare.com/webhook/59ee4e3d-6ee8-4899-898d-dbeb71f70678';

    const logEl = document.getElementById('log');
    const qEl = document.getElementById('q');
    const sendBtn = document.getElementById('send');

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /** Простое оформление: переносы, **жирный** */
    function formatResponse(text) {
      let s = escapeHtml(text || '');
      s = s.replace(/\n/g, '<br>');
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return s;
    }

    function appendRow(role, htmlBody, label) {
      const row = document.createElement('div');
      row.className = 'row ' + (role === 'user' ? 'user' : 'ai');
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      if (label) {
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = label;
        bubble.appendChild(meta);
      }
      const body = document.createElement('div');
      body.className = 'ai-body';
      body.innerHTML = htmlBody;
      bubble.appendChild(body);
      row.appendChild(bubble);
      logEl.appendChild(row);
      logEl.scrollTop = logEl.scrollHeight;
      return row;
    }

    function showTyping() {
      const row = document.createElement('div');
      row.className = 'row ai';
      row.id = 'typing-row';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML =
        '<div class="typing" aria-label="Ответ загружается"><span></span><span></span><span></span></div>';
      row.appendChild(bubble);
      logEl.appendChild(row);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function hideTyping() {
      const t = document.getElementById('typing-row');
      if (t) t.remove();
    }

    function showError(msg) {
      const row = document.createElement('div');
      row.className = 'row ai';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = '<div class="err">' + escapeHtml(msg) + '</div>';
      row.appendChild(bubble);
      logEl.appendChild(row);
      logEl.scrollTop = logEl.scrollHeight;
    }

    /** Объект { response: "..." } или массив [{ response: "..." }, …] — берём первый ответ */
    function extractResponseField(data) {
      if (data == null || typeof data !== 'object') return null;
      if (typeof data.response === 'string') return data.response;
      if (Array.isArray(data) && data.length > 0) {
        const first = data[0];
        if (first && typeof first === 'object' && typeof first.response === 'string') {
          return first.response;
        }
      }
      return null;
    }

    async function askServer(question) {
      const base = (API_URL || '').replace(/\?$/, '').replace(/\/$/, '');
      if (!base) {
        throw new Error(
          'Укажите API_URL внутри скрипта (полный URL без ? в конце).',
        );
      }
      const url = base + (base.includes('?') ? '&' : '?') + 'ask=' + encodeURIComponent(question);
      const res = await fetch(url, {
        method: 'GET',
        headers: { Accept: 'application/json' },
      });
      const raw = await res.text();
      if (!res.ok) {
        throw new Error('HTTP ' + res.status + ': ' + raw.slice(0, 200));
      }
      let data;
      try {
        data = JSON.parse(raw);
      } catch (e) {
        throw new Error('Ответ не JSON: ' + raw.slice(0, 200));
      }
      const responseText = extractResponseField(data);
      if (responseText == null) {
        throw new Error(
          'В ответе нет строкового поля response (объект или непустой массив с таким объектом).',
        );
      }
      return responseText;
    }

    async function runAsk(text) {
      const q = (text || '').trim();
      if (!q) return;
      appendRow('user', escapeHtml(q).replace(/\n/g, '<br>'), 'Вы');
      qEl.value = '';
      sendBtn.disabled = true;
      showTyping();
      try {
        const answer = await askServer(q);
        hideTyping();
        appendRow('ai', formatResponse(answer), 'Ответ');
      } catch (e) {
        hideTyping();
        showError(e.message || String(e));
      } finally {
        sendBtn.disabled = false;
        qEl.focus();
      }
      syncUrlAsk(q);
    }

    /** Поддержка открытия страницы как …?ask=Вопрос */
    function syncUrlAsk(lastSent) {
      try {
        const u = new URL(window.location.href);
        u.searchParams.set('ask', lastSent);
        window.history.replaceState({}, '', u);
      } catch (_) {}
    }

    function readInitialAsk() {
      try {
        const u = new URL(window.location.href);
        return u.searchParams.get('ask') || '';
      } catch (_) {
        return '';
      }
    }

    sendBtn.addEventListener('click', () => runAsk(qEl.value));
    qEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        runAsk(qEl.value);
      }
    });

    (function init() {
      const initial = readInitialAsk().trim();
      if (initial) {
        qEl.value = initial;
        runAsk(initial);
      } else {
        qEl.focus();
      }
    })();
  </script>
</body>
</html>
